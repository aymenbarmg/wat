<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>برمجاتي</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background-color: #e5ddd5; display: flex; flex-direction: column; height: 100vh; justify-content: center; align-items: center; overflow: hidden; }
        .screen { display: none !important; width: 90%; max-width: 400px; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.15); text-align: center; }
        .screen.active { display: block !important; }
        h2 { color: #075e54; margin-bottom: 10px; }
        p { color: #666; font-size: 14px; margin-bottom: 15px; }
        input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; outline: none; font-size: 16px; text-align: center; margin-bottom: 15px; }
        button { width: 100%; background-color: #128c7e; color: white; border: none; padding: 15px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; margin-bottom: 10px; }
        button:hover { background-color: #075e54; }
        button.secondary { background-color: #34b7f1; }
        #chatScreen { width: 100%; max-width: 100%; height: 100vh; border-radius: 0; padding: 0; background-color: #e5ddd5; }
        #chatScreen.active { display: flex !important; flex-direction: column; }
        .header { background-color: #075e54; color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; width: 100%; height: 60px; }
        .chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; width: 100%; margin-bottom: 60px; }
        .message { max-width: 70%; padding: 10px 15px; border-radius: 8px; font-size: 15px; word-wrap: break-word; }
        .message.sent { background-color: #dcf8c6; align-self: flex-start; border-top-left-radius: 0; }
        .message.received { background-color: white; align-self: flex-end; border-top-right-radius: 0; }
        .message .username { font-size: 11px; color: #27ae60; font-weight: bold; margin-bottom: 3px; }
        .input-area { background-color: #f0f0f0; padding: 10px; display: flex; gap: 10px; align-items: center; width: 100%; position: fixed; bottom: 0; height: 60px; }
        .input-area input { flex: 1; border-radius: 20px; text-align: right; padding: 12px 20px; margin-bottom: 0; }
        .input-area button { width: auto; border-radius: 20px; padding: 12px 25px; margin-bottom: 0; }
    </style>
    <!-- تم إصلاح رابط المكتبة ليعمل فوري وبدون تعليق -->
    <script src="https://socket.io"></script>
</head>
<body>

    <!-- 1. شاشة الاسم -->
    <div class="screen active" id="nameScreen">
        <h2>مرحباً في برمجاتي</h2>
        <p>أدخل اسمك المستعار لبدء المحادثة</p>
        <input type="text" id="usernameInput" placeholder="اكتب اسمك هنا...">
        <button type="button" onclick="saveName()">استمرار</button>
    </div>

    <!-- 2. خيارات المحادثة -->
    <div class="screen" id="optionsScreen">
        <h2>خيارات المحادثة</h2>
        <p>مرحباً بك في تطبيقك الخاص، اختر ما تريد:</p>
        <button type="button" onclick="showRoomScreen('create')">إنشاء محادثة جديدة</button>
        <button type="button" class="secondary" onclick="showRoomScreen('join')">الانضمام إلى محادثة</button>
    </div>

    <!-- 3. شاشة الرمز المكون من 4 أرقام -->
    <div class="screen" id="roomScreen">
        <h2 id="roomTitle">غرفة المحادثة</h2>
        <p id="roomDesc">أدخل رمزاً مكوناً من 4 أرقام</p>
        <input type="number" id="roomCodeInput" placeholder="XXXX" pattern="[0-9]*" inputmode="numeric">
        <p id="creatorInfo" style="color: #27ae60; font-weight: bold; margin-bottom: 15px; display: none;"></p>
        <button type="button" id="roomBtn" onclick="processRoomAction()">تأكيد</button>
        <button type="button" class="secondary" style="background-color: #777;" onclick="switchScreen('optionsScreen')">رجوع</button>
    </div>

    <!-- 4. شاشة الشات والرسائل المتصلة -->
    <div class="screen" id="chatScreen">
        <div class="header">
            <h3>برمجاتي للاتصال</h3>
            <div>غرفة: <span id="activeRoomCode" style="font-weight: bold;">0000</span></div>
        </div>
        <div class="chat-container" id="chatContainer"></div>
        <div class="input-area">
            <input type="text" id="messageInput" placeholder="اكتب رسالتك هنا..." onkeypress="if(event.key==='Enter') sendMessage()">
            <button type="button" onclick="sendMessage()">إرسال</button>
        </div>
    </div>

    <script>
        let myUsername = "", currentRoomCode = "", currentActionType = "";
        let socket = io('https://pie-historical-crater.glitch.me');

        function switchScreen(id) {
            document.getElementById('nameScreen').classList.remove('active');
            document.getElementById('optionsScreen').classList.remove('active');
            document.getElementById('roomScreen').classList.remove('active');
            document.getElementById('chatScreen').classList.remove('active');
            document.getElementById(id).classList.add('active');
        }

        function saveName() {
            const name = document.getElementById('usernameInput').value.trim();
            if (name === "") return alert("اكتب اسمك أولاً!");
            myUsername = name;
            switchScreen('optionsScreen');
        }

        function showRoomScreen(action) {
            currentActionType = action;
            document.getElementById('roomCodeInput').value = "";
            document.getElementById('creatorInfo').style.display = "none";
            document.getElementById('roomBtn').onclick = processRoomAction;
            
            if (action === 'create') {
                document.getElementById('roomTitle').innerText = "إنشاء محادثة جديدة";
                document.getElementById('roomDesc').innerText = "اختر رمزاً من 4 أرقام وأعطه لصديقك:";
                document.getElementById('roomBtn').innerText = "إنشاء الغرفة وبدء الشات";
            } else {
                document.getElementById('roomTitle').innerText = "الانضمام للمحادثة";
                document.getElementById('roomDesc').innerText = "أدخل الرمز للبحث عن الغرفة:";
                document.getElementById('roomBtn').innerText = "بحث عن الغرفة";
            }
            switchScreen('roomScreen');
        }

        function appendMessageToDOM(sender, text) {
            const container = document.getElementById('chatContainer');
            const msgDiv = document.createElement('div');
            msgDiv.className = (sender === myUsername) ? 'message sent' : 'message received';
            msgDiv.innerHTML = `<div class="username">${sender}</div><div>${text}</div>`;
            container.appendChild(msgDiv);
            container.scrollTop = container.scrollHeight;
        }

        function processRoomAction() {
            let code = document.getElementById('roomCodeInput').value.trim();
            if (code.length !== 4) return alert("يجب أن يتكون الرمز من 4 أرقام!");
            currentRoomCode = code;

            if (currentActionType === 'create') {
                enterChat(currentRoomCode);
                if (socket.connected) {
                    socket.emit('register-room-creator', { room: currentRoomCode, creator: myUsername });
                }
            } else {
                if (socket.connected) {
                    socket.emit('check-room-owner', currentRoomCode);
                } else {
                    alert("جاري الاتصال بالخادم، يرجى المحاولة بعد ثوانٍ قليلة.");
                }
            }
        }

        socket.on('room-owner-response', (creatorName) => {
            const info = document.getElementById('creatorInfo');
            const btn = document.getElementById('roomBtn');
            if (!creatorName) return alert("هذه الغرفة غير موجودة حالياً!");

            info.innerText = `مؤسس الغرفة: ${creatorName}`;
            info.style.display = "block";
            btn.innerText = "تأكيد الانضمام والتشات";
            btn.onclick = function() { enterChat(currentRoomCode); };
        });

        function enterChat(code) {
            document.getElementById('activeRoomCode').innerText = code;
            switchScreen('chatScreen');
            if (socket.connected) {
                socket.emit('join-room', code);
            }
        }

        socket.on('receive-message', (data) => {
            if (data.sender !== myUsername) {
                appendMessageToDOM(data.sender, data.text);
            }
        });

        function sendMessage() {
            const input = document.getElementById('messageInput'), text = input.value.trim();
            if (text === '') return;
            
            appendMessageToDOM(myUsername, text);
            if (socket.connected) {
                socket.emit('send-message', { room: currentRoomCode, sender: myUsername, text: text });
            }
            input.value = '';
            input.focus();
        }
    </script>
</body>
</html>
