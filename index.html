<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>برمجاتي - محادثة خاصة</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #e5ddd5; display: flex; flex-direction: column; height: 100vh; justify-content: center; align-items: center; overflow: hidden; }
        .screen { display: none !important; width: 90%; max-width: 400px; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.15); text-align: center; }
        .screen.active { display: block !important; }
        h2 { color: #075e54; margin-bottom: 10px; font-size: 22px; }
        p { color: #666; font-size: 14px; margin-bottom: 15px; }
        input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; outline: none; font-size: 16px; text-align: center; margin-bottom: 15px; }
        button { width: 100%; background-color: #128c7e; color: white; border: none; padding: 15px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; margin-bottom: 10px; }
        button:hover { background-color: #075e54; }
        button.secondary { background-color: #34b7f1; }
        #chatScreen { width: 100%; max-width: 100%; height: 100vh; border-radius: 0; padding: 0; background-color: #e5ddd5; }
        #chatScreen.active { display: flex !important; flex-direction: column; }
        .header { background-color: #075e54; color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; width: 100%; height: 60px; }
        .header h1 { font-size: 18px; }
        .header .room-info { font-size: 13px; background: rgba(255,255,255,0.2); padding: 4px 10px; border-radius: 10px; }
        .chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; width: 100%; margin-bottom: 60px; }
        .message { max-width: 70%; padding: 10px 15px; border-radius: 8px; font-size: 15px; line-height: 1.4; word-wrap: break-word; }
        .message.sent { background-color: #dcf8c6; align-self: flex-start; border-top-left-radius: 0; }
        .message.received { background-color: white; align-self: flex-end; border-top-right-radius: 0; }
        .message .username { font-size: 11px; color: #27ae60; font-weight: bold; margin-bottom: 3px; }
        .input-area { background-color: #f0f0f0; padding: 10px; display: flex; gap: 10px; align-items: center; width: 100%; position: fixed; bottom: 0; height: 60px; }
        .input-area input { flex: 1; border-radius: 20px; text-align: right; padding: 12px 20px; margin-bottom: 0; }
        .input-area button { width: auto; border-radius: 20px; padding: 12px 25px; margin-bottom: 0; }
    </style>
</head>
<body>

    <!-- 1. شاشة طلب الاسم -->
    <div class="screen active" id="nameScreen">
        <h2>مرحباً بك في برمجاتي</h2>
        <p>يرجى إدخال اسمك المستعار للبدء</p>
        <input type="text" id="usernameInput" placeholder="اكتب اسمك هنا...">
        <button type="button" onclick="saveName()">استمرار</button>
    </div>

    <!-- 2. شاشة خيارات المحادثة -->
    <div class="screen" id="optionsScreen">
        <h2>خيارات المحادثة</h2>
        <p>مرحباً <span id="userGreeting" style="font-weight:bold; color:#128c7e;"></span>، ماذا تريد أن تفعل الآن؟</p>
        <button type="button" onclick="showRoomScreen('create')">إنشاء محادثة جديدة</button>
        <button type="button" class="secondary" onclick="showRoomScreen('join')">الانضمام إلى محادثة قائمة</button>
    </div>

    <!-- 3. شاشة إدخال أو إنشاء الرمز (4 أرقام) -->
    <div class="screen" id="roomScreen">
        <h2 id="roomTitle">إنشاء غرفة محادثة</h2>
        <p id="roomDesc">أدخل رمزاً مكوناً من 4 أرقام</p>
        <input type="number" id="roomCodeInput" placeholder="XXXX" pattern="[0-9]*" inputmode="numeric">
        <button type="button" id="roomBtn" onclick="processRoomAction()">تأكيد الدخول</button>
        <button type="button" class="secondary" style="background-color: #777;" onclick="backToOptions()">رجوع</button>
    </div>

    <!-- 4. شاشة المحادثة والشات -->
    <div class="screen" id="chatScreen">
        <div class="header">
            <h1>برمجاتي للاتصال</h1>
            <div class="room-info">رمز الغرفة: <span id="activeRoomCode" style="font-weight: bold;">0000</span></div>
        </div>
        <div class="chat-container" id="chatContainer"></div>
        <div class="input-area">
            <input type="text" id="messageInput" placeholder="اكتب رسالتك هنا..." onkeypress="handleKeyPress(event)">
            <button type="button" onclick="sendMessage()">إرسال</button>
        </div>
    </div>

    <script>
        let myUsername = "", currentRoomCode = "", lastMessageCount = 0, chatInterval = null;
        const binId = "661858a7e41b4d34e4e24ef5", apiKey = "$2a$10$wE0vS2p3r78M2.V6D9DgnuM9qfeWof2F8zUnxW038Rsh56.oM1M2S";

        function switchScreen(screenId) {
            document.getElementById('nameScreen').classList.remove('active');
            document.getElementById('optionsScreen').classList.remove('active');
            document.getElementById('roomScreen').classList.remove('active');
            document.getElementById('chatScreen').classList.remove('active');
            document.getElementById(screenId).classList.add('active');
        }

        function saveName() {
            const name = document.getElementById('usernameInput').value.trim();
            if (name === "") { alert("الرجاء كتابة اسمك أولاً!"); return; }
            myUsername = name;
            document.getElementById('userGreeting').innerText = myUsername;
            switchScreen('optionsScreen');
        }

        function showRoomScreen(action) {
            const title = document.getElementById('roomTitle'), desc = document.getElementById('roomDesc'), btn = document.getElementById('roomBtn');
            document.getElementById('roomCodeInput').value = "";
            if (action === 'create') {
                title.innerText = "إنشاء محادثة جديدة";
                desc.innerText = "اختر رمزاً من 4 أرقام وأعطه لصديقك ليتمكن من الدخول معك:";
                btn.innerText = "إنشاء الغرفة وبدء الشات";
            } else {
                title.innerText = "الانضمام للمحادثة";
                desc.innerText = "أدخل الرمز المكون من 4 أرقام الذي أرسله لك صديقك:";
                btn.innerText = "انضمام الآن";
            }
            switchScreen('roomScreen');
        }

        function backToOptions() { switchScreen('optionsScreen'); }

        function processRoomAction() {
            let code = document.getElementById('roomCodeInput').value.trim();
            if (code.length > 4) code = code.slice(0, 4);
            if (code.length !== 4) { alert("يجب أن يتكون الرمز من 4 أرقام تماماً!"); return; }
            currentRoomCode = code;
            document.getElementById('activeRoomCode').innerText = currentRoomCode;
            
            switchScreen('chatScreen');
            fetchMessages();
            if(chatInterval) clearInterval(chatInterval);
            chatInterval = setInterval(fetchMessages, 2000);
        }

        // دالة مخصصة لإضافة الرسالة في الشاشة فوراً
        function appendMessageToDOM(sender, text) {
            const chatContainer = document.getElementById('chatContainer');
            const msgDiv = document.createElement('div');
            msgDiv.className = (sender === myUsername) ? 'message sent' : 'message received';
            msgDiv.innerHTML = `<div class="username">${sender}</div><div>${text}</div>`;
            chatContainer.appendChild(msgDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function fetchMessages() {
            fetch(`https://jsonbin.io{binId}/latest`, { headers: { 'X-Master-Key': apiKey } })
            .then(res => res.json())
            .then(data => {
                const allRooms = data.record || {}, roomMessages = allRooms['room_' + currentRoomCode] || [];
                if (roomMessages.length !== lastMessageCount) {
                    const chatContainer = document.getElementById('chatContainer');
                    chatContainer.innerHTML = "";
                    roomMessages.forEach(msg => {
                        appendMessageToDOM(msg.sender, msg.text);
                    });
                    lastMessageCount = roomMessages.length;
                }
            }).catch(err => console.log("جاري المزامنة..."));
        }

        function sendMessage() {
            const messageInput = document.getElementById('messageInput'), text = messageInput.value.trim();
            if (text === '') return;

            // 1. إظهار الرسالة في الشات فوراً أمامك بدون انتظار السيرفر
            appendMessageToDOM(myUsername, text);
            lastMessageCount++; // زيادة العداد محلياً لتجنب التكرار عند التحديث التالي

            // 2. إرسال وتحديث السيرفر في الخلفية
            fetch(`https://jsonbin.io{binId}/latest`, { headers: { 'X-Master-Key': apiKey } })
            .then(res => res.json())
            .then(data => {
                let allRooms = data.record || {};
                if (!allRooms['room_' + currentRoomCode]) { allRooms['room_' + currentRoomCode] = []; }
                allRooms['room_' + currentRoomCode].push({ sender: myUsername, text: text });
                return fetch(`https://jsonbin.io{binId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json', 'X-Master-Key': apiKey },
                    body: JSON.stringify(allRooms)
                });
            });

            messageInput.value = '';
            messageInput.focus();
        }

        function handleKeyPress(e) { if (e.key === 'Enter') { sendMessage(); } }
    </script>
</body>
