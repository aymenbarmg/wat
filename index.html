<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لمسه</title>

<link rel="icon" href="icon.jpg">
 <link rel="icon" type="image/jpeg" href="icon.jpg">
    <style>
      *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Cairo',sans-serif;
}

body{
    height:100vh;
    overflow:hidden;
    background:
    linear-gradient(rgba(0,0,0,0.45),rgba(0,0,0,0.45)),
    url("https://images.unsplash.com/photo-1516321318423-f06f85e504b3?q=80&w=1400&auto=format&fit=crop");
    background-size:cover;
    background-position:center;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* جميع الشاشات */
.screen{
    display:none !important;
    width:95%;
    max-width:420px;
    padding:30px;
    border-radius:30px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,0.1);
    box-shadow:0 8px 32px rgba(0,0,0,0.35);
    animation:show 0.4s ease;
}

.screen.active{
    display:block !important;
}

@keyframes show{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* العنوان */
h2,h3{
    color:white;
    text-align:center;
    margin-bottom:10px;
    font-size:28px;
}

p{
    color:#ddd;
    text-align:center;
    margin-bottom:18px;
    line-height:1.6;
}

/* الإدخال */
input{
    width:100%;
    padding:15px;
    border:none;
    outline:none;
    border-radius:18px;
    background:rgba(255,255,255,0.1);
    color:white;
    font-size:16px;
    margin-bottom:15px;
    backdrop-filter:blur(10px);
}

input::placeholder{
    color:#ccc;
}

/* الأزرار */
button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:18px;
    background:linear-gradient(45deg,#00c6ff,#0072ff);
    color:white;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
    margin-bottom:12px;
    box-shadow:0 4px 15px rgba(0,114,255,0.4);
}

button:hover{
    transform:translateY(-2px) scale(1.02);
}

button.secondary{
    background:linear-gradient(45deg,#ff416c,#ff4b2b);
    box-shadow:0 4px 15px rgba(255,75,43,0.4);
}

/* شاشة المحادثة */
#chatScreen{
    width:100%;
    height:100vh;
    max-width:100%;
    border-radius:0;
    padding:0;
    background:none;
}

#chatScreen.active{
    display:flex !important;
    flex-direction:column;
}

/* الهيدر */
.header{
    height:70px;
    background:rgba(0,0,0,0.35);
    backdrop-filter:blur(20px);
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 20px;
    color:white;
    border-bottom:1px solid rgba(255,255,255,0.08);
}

/* الرسائل */
.chat-container{
    flex:1;
    overflow-y:auto;
    padding:20px;
    display:flex;
    flex-direction:column;
    gap:12px;
}

/* الرسالة */
.message{
    max-width:75%;
    padding:14px 16px;
    border-radius:20px;
    animation:fadeIn 0.3s ease;
    position:relative;
    backdrop-filter:blur(10px);
}

.message.sent{
    align-self:flex-end;
    background:linear-gradient(45deg,#00b09b,#96c93d);
    color:white;
    border-bottom-right-radius:5px;
}

.message.received{
    align-self:flex-start;
    background:rgba(255,255,255,0.15);
    color:white;
    border-bottom-left-radius:5px;
}

/* اسم المستخدم */
.username{
    font-size:11px;
    color:#ffe082;
    margin-bottom:5px;
    font-weight:bold;
}

/* الكتابة */
.input-area{
    padding:12px;
    display:flex;
    gap:10px;
    background:rgba(0,0,0,0.35);
    backdrop-filter:blur(20px);
}

.input-area input{
    flex:1;
    margin:0;
    border-radius:30px;
    padding:15px 20px;
}

.input-area button{
    width:auto;
    border-radius:30px;
    padding:0 25px;
    margin:0;
}

/* سكرول */
.chat-container::-webkit-scrollbar{
    width:5px;
}

.chat-container::-webkit-scrollbar-thumb{
    background:rgba(255,255,255,0.2);
    border-radius:10px;
}

/* الحركة */
@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(10px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}
    </style>
    
    <!-- استدعاء مكتبات Firebase المستقرة -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";

import {
    getDatabase,
    ref,
    push,
    set,
    get,
    child,
    onChildAdded
}

from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

const firebaseConfig = {

    apiKey: "AIzaSyDhY1_FeJ53ZUpZlszD9vKkjyMz9HOgYN8",

    authDomain: "wats-41f58.firebaseapp.com",

    databaseURL: "https://wats-41f58-default-rtdb.firebaseio.com",

    projectId: "wats-41f58",

    storageBucket: "wats-41f58.appspot.com",

    messagingSenderId: "277505138255",

    appId: "1:277505138255:web:b7260eb4c7a672141ed43a"

};

const app = initializeApp(firebaseConfig);

const db = getDatabase(app);

window.myUsername = "";
window.currentRoomCode = "";
window.currentActionType = "";
// فحص الاسم المحفوظ
window.onload = function() {

    const savedName =
        localStorage.getItem(
            "chatUsername"
        );

    if(savedName) {

        window.myUsername =
            savedName;

        document.getElementById(
            'usernameInput'
        ).value = savedName;

        switchScreen(
            'optionsScreen'
        );

    }

};
// تبديل الصفحات
window.switchScreen = function(id) {

    document.querySelectorAll('.screen')
    .forEach(screen => {

        screen.classList.remove('active');

    });

    document.getElementById(id)
    .classList.add('active');

};

// حفظ الاسم


   window.saveName = function() {

    const name =
        document.getElementById('usernameInput')
        .value.trim();

    if(name === "") {

        alert("اكتب اسمك");

        return;

    }

    // حفظ الاسم
    localStorage.setItem(
        "chatUsername",
        name
    );

    window.myUsername = name;

    switchScreen('optionsScreen');

};

// فتح شاشة الغرف
window.showRoomScreen = function(action) {

    currentActionType = action;

    document.getElementById('roomCodeInput')
    .value = "";

    switchScreen('roomScreen');

};

// إنشاء أو دخول غرفة
window.processRoomAction = async function() {

    const code =
        document.getElementById('roomCodeInput')
        .value.trim();

    if(code.length < 4) {

        alert("الكود يجب أن يكون 4 أرقام");

        return;

    }

    currentRoomCode = code;

    // إنشاء غرفة
    if(currentActionType === "create") {

        await set(
            ref(db, 'rooms/' + code),
            {
                creator: myUsername
            }
        );

        enterChat(code);

    }

    // دخول غرفة
    else {

        const snapshot =
            await get(
                child(
                    ref(db),
                    'rooms/' + code
                )
            );

        if(!snapshot.exists()) {

            alert("الغرفة غير موجودة");

            return;

        }

        enterChat(code);

    }

};

// دخول الشات
window.enterChat = function(code) {

    document.getElementById('activeRoomCode')
    .innerText = code;

    switchScreen('chatScreen');

    document.getElementById('chatContainer')
    .innerHTML = "";

    onChildAdded(
        ref(db, 'rooms/' + code + '/messages'),

        (snapshot) => {

            const msg = snapshot.val();

            appendMessageToDOM(
                msg.sender,
                msg.text
            );

        }
    );

};

// إضافة رسالة للشاشة
window.appendMessageToDOM = function(sender, text) {

    const container =
        document.getElementById('chatContainer');

    const div =
        document.createElement('div');

    div.className =
        sender === myUsername
        ? 'message sent'
        : 'message received';

    div.innerHTML = `
        <div class="username">${sender}</div>
        <div>${text}</div>
    `;

    container.appendChild(div);

    container.scrollTop =
        container.scrollHeight;

};

// إرسال رسالة
window.sendMessage = async function() {

    const input =
        document.getElementById('messageInput');

    const text =
        input.value.trim();

    if(text === "") return;

    await push(
        ref(
            db,
            'rooms/' + currentRoomCode + '/messages'
        ),
        {
            sender: myUsername,
            text: text
        }
    );

    input.value = "";

};

</script>
</head>
<body>

    <!-- 1. شاشة الاسم -->
    <div class="screen active" id="nameScreen">
        <h2>برمجاتي</h2>
        <p>أدخل اسمك المستعار لبدء المحادثة</p>
        <input type="text" id="usernameInput" placeholder="اكتب اسمك هنا...">
        <button type="button" onclick="saveName()">استمرار</button>
    </div>

    <!-- 2. خيارات المحادثة -->
    <div class="screen" id="optionsScreen">
        <h2>خيارات المحادثة</h2>
        <p>اختر الإجراء المطلوب للبدء:</p>
        <button type="button" onclick="showRoomScreen('create')">إنشاء محادثة جديدة</button>
        <button type="button" class="secondary" onclick="showRoomScreen('join')">الانضمام إلى محادثة</button>
    </div>

    <!-- 3. شاشة الرمز -->
    <div class="screen" id="roomScreen">
        <h2 id="roomTitle">غرفة المحادثة</h2>
        <p id="roomDesc">أدخل رمزاً مكوناً من 4 أرقام</p>
        <input type="text" id="roomCodeInput" placeholder="1234">
        <p id="creatorInfo" style="color: #27ae60; font-weight: bold; margin-bottom: 15px; display: none;"></p>
        <button type="button" id="roomBtn" onclick="processRoomAction()">تأكيد</button>
        <button type="button" class="secondary" style="background-color: #777;" onclick="switchScreen('optionsScreen')">رجوع</button>
    </div>

    <!-- 4. شاشة الشات والرسائل -->
    <div class="screen" id="chatScreen">
        <div class="header">
            <h3>برمجاتي للاتصال</h3>
            <div>غرفة: <span id="activeRoomCode" style="font-weight: bold;">0000</span></div>
        </div>
        <div class="chat-container" id="chatContainer"></div>
        <div class="input-area">
            <input type="text" id="messageInput" placeholder="اكتب رسالتك هنا..." onkeypress="if(event.key==='Enter') sendMessage()">
            <button type="button" onclick="sendMessage()">إرسال</button>
        </div>
    </div>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

  // معلومات الفايربيس الخاصة بك
  const firebaseConfig = {
    apiKey: "AIzaSyDhY1_FeJ53ZUpZlszD9vKkjyMz9HOgYN8",
    authDomain: "wats-41f58.firebaseapp.com",
    databaseURL: "https://wats-41f58-default-rtdb.firebaseio.com",
    projectId: "wats-41f58",
    storageBucket: "wats-41f58.firebasestorage.app",
    messagingSenderId: "277505138255",
    appId: "1:277505138255:web:b7260eb4c7a672141ed43a"
  };

  // تشغيل قاعدة البيانات
  const app = initializeApp(firebaseConfig);
  const database = getDatabase(app);

  // هذا الجزء السحري يترجم كودك القديم (db.ref) إلى الطريقة الجديدة تلقائياً
  window.db = {
    ref: function(path) {
      return {
        push: function(data) {
          return push(ref(database, path), data);
        }
      };
    }
  };
</script>
</body>
</html>
