<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>برمجاتي - WhatsApp Style</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #e5ddd5; display: flex; flex-direction: column; height: 100vh; }
        .header { background-color: #075e54; color: white; padding: 15px; display: flex; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .header h1 { font-size: 20px; font-weight: bold; }
        .header .status { font-size: 12px; color: #d1f4cc; margin-right: 10px; }
        .chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .message { max-width: 70%; padding: 10px 15px; border-radius: 8px; font-size: 15px; line-height: 1.4; position: relative; word-wrap: break-word; }
        .message.sent { background-color: #dcf8c6; align-self: flex-start; border-top-left-radius: 0; }
        .message.received { background-color: white; align-self: flex-end; border-top-right-radius: 0; }
        .message .username { font-size: 11px; color: #27ae60; font-weight: bold; margin-bottom: 3px; }
        .input-area { background-color: #f0f0f0; padding: 10px; display: flex; gap: 10px; align-items: center; }
        .input-area input { flex: 1; padding: 12px; border: none; border-radius: 20px; outline: none; font-size: 15px; }
        .input-area button { background-color: #128c7e; color: white; border: none; padding: 12px 20px; border-radius: 20px; cursor: pointer; font-weight: bold; font-size: 15px; }
        .input-area button:hover { background-color: #075e54; }
    </style>
    <!-- تحميل مكتبة الشبكة أولاً لضمان الاستقرار -->
    <script src="https://cdn.jsdelivr.net/npm/gun/gun.js"></script>
</head>
<body>

    <div class="header">
        <div>
            <h1>برمجاتي</h1>
            <div class="status" id="connectionStatus">جاري الاتصال بالشبكة المشتركة...</div>
        </div>
    </div>

    <div class="chat-container" id="chatContainer"></div>

    <div class="input-area">
        <input type="text" id="messageInput" placeholder="اكتب رسالتك هنا..." onkeypress="handleKeyPress(event)">
        <button onclick="sendMessage()">إرسال</button>
    </div>

    <script>
        // طلب الاسم وتخزينه لمرة واحدة
        const myUsername = localStorage.getItem('chat_user') || prompt("أدخل اسمك المستعار لبدء المحادثة:") || "مستخدم مجهول";
        localStorage.setItem('chat_user', myUsername);

        // استخدام سيرفرات بديلة حديثة ومستقرة تماماً وعالمية
        const gun = Gun([
            'https://gun-us.herokuapp.com/gun',
            'https://gun-matrix.herokuapp.com/gun',
            'https://gun-eu.herokuapp.com/gun'
        ]);
        
        // تسمية الغرفة باسم فريد وخاص بتطبيقك
        const chatRoom = gun.get('barmajaty_chat_room_v2');
        const chatContainer = document.getElementById('chatContainer');
        const messageInput = document.getElementById('messageInput');
        
        // تحديث حالة الاتصال في الواجهة
        document.getElementById('connectionStatus').innerText = "متصل الآن - جاهز للمحادثة الفورية";

        // عرض الرسائل فور وصولها من السيرفر المشترك
        chatRoom.map().on(function(data, id) {
            if (!data || !data.text || !data.sender) return;
            
            // تخطي التكرار
            if (document.getElementById(id)) return;

            const msgDiv = document.createElement('div');
            msgDiv.id = id;
            
            // فرز الرسائل (مرسلة منك أو مستلمة من الطرف الآخر)
            if (data.sender === myUsername) {
                msgDiv.className = 'message sent';
            } else {
                msgDiv.className = 'message received';
            }

            msgDiv.innerHTML = `<div class="username">${data.sender}</div><div>${data.text}</div>`;
            chatContainer.appendChild(msgDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight; // نزول تلقائي لآخر رسالة
        });

        // دالة الإرسال الأساسية
        function sendMessage() {
            const text = messageInput.value.trim();
            if (text === '') return;

            // رفع البيانات فوراً للسيرفر لتبادلها مع الأجهزة الأخرى
            chatRoom.set({
                sender: myUsername,
                text: text,
                timestamp: Date.now()
            });

            messageInput.value = '';
            messageInput.focus();
        }

        function handleKeyPress(e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        }
    </script>
</body>
</html>
